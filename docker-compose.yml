version: '3.8'

services:
  db-monitoring:
    image: mysql:9.0
    container_name: db-monitoring
    environment:
      MYSQL_DATABASE: monitoring
      MYSQL_ROOT_PASSWORD: qwerty1234
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pqwerty1234"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  db-employees:
    image: mysql:9.0
    container_name: db-employees
    environment:
      MYSQL_DATABASE: employees
      MYSQL_ROOT_PASSWORD: qwerty1234
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pqwerty1234"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  employee-service:
    build:
      context: .
      dockerfile: employees/Dockerfile
    container_name: employee-service
    restart: always
    depends_on:
      - db-employees
      - eureka-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-employees:3306/employees
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=qwerty1234
      - SPRING_LIQUIBASE_ENABLED=true
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  monitoring-service:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    container_name: monitoring-service
    restart: always
    depends_on:
      - db-monitoring
      - eureka-server
      - employee-service
    environment:
      - SPRING_PROFILES_ACTIVE=demo
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-monitoring:3306/monitoring
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=qwerty1234
      - SPRING_LIQUIBASE_ENABLED=true
    volumes:
      - ./logs/monitoring:/app/log
    ports:
      - "8081:8081"
