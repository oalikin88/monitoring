databaseChangeLog:
  - changeSet:
      id: 20260307-1
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: asuo
      changes:
        - createTable:
            tableName: asuo
            columns:
              - column:
                  name: asuo_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: asuo_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: date_exploitation_begin
                  type: DATETIME
              - column:
                  name: name_from_onec
                  type: VARCHAR(255)
              - column:
                  name: sub_display_amount
                  type: INT
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: program_software_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: program_software_fk
                      referencedTableName: program_software
                      referencedColumnNames: id
              - column:
                  name: sub_display_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: sub_display_model_fk
                      referencedTableName: sub_display_model
                      referencedColumnNames: id
