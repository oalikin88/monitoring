databaseChangeLog:
  - changeSet:
      id: 20260301-12
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: printer
      changes:
        - createTable:
            tableName: printer
            columns:
              - column:
                  name: printer_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: printer_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: date_exploitation_begin
                  type: DATETIME
              - column:
                  name: name_frome_onec
                  type: VARCHAR(255)
              - column:
                  name: number_room
                  type: VARCHAR(150)
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: printer_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: printer_model_fk
                      referencedTableName: printer_model
                      referencedColumnNames: id
