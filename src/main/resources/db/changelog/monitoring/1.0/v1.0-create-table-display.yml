databaseChangeLog:
  - changeSet:
      id: 20260301-211
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: display
      changes:
        - createTable:
            tableName: display
            columns:
              - column:
                  name: display_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: display_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: display_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: display_model_fk
                      referencedTableName: display_model
                      referencedColumnNames: id
