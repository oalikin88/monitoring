databaseChangeLog:
  - changeSet:
      id: 20260307-13
      author: Oleg Alikin
      changes:
        - createTable:
            tableName: cartridge_model_models_printers
            columns:
              - column:
                  name: model_cartridges_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: models_printers_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: cartridge_model_models_printers
            columnNames: model_cartridges_id, models_printers_id
            constraintName: pk_cartridge_model_printers
        - addForeignKeyConstraint:
            baseTableName: cartridge_model_models_printers
            baseColumnNames: model_cartridges_id
            constraintName: fk_cartridge_model_cartridges
            referencedTableName: cartridge_model
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: cartridge_model_models_printers
            baseColumnNames: models_printers_id
            constraintName: fk_cartridge_model_printers
            referencedTableName: printer
            referencedColumnNames: printer_id
            onDelete: CASCADE