databaseChangeLog:
  - changeSet:
      id: 20260311-14
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: repair
      changes:
        - createTable:
            tableName: repair
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: repair_pkey
                    nullable: false
              - column:
                  name: date_repair
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: defenition
                  type: VARCHAR(255)
              - column:
                  name: document_number
                  type: VARCHAR(200)
              - column:
                  name: object_buing_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: repair_object_buing_fk
                    referencedTableName: object_buing
                    referencedColumnNames: id                 

