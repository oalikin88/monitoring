databaseChangeLog:
  - changeSet:
      id: 20260302-2
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: hdd
      changes:
        - createTable:
            tableName: hdd
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: hdd_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: capacity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

