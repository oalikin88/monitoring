databaseChangeLog:
  - changeSet:
      id: 20260301-15
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: conditioner
      changes:
        - createTable:
            tableName: conditioner
            columns:
              - column:
                  name: conditioner_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: conditioner_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: conditioner_type
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: have_pomp
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: name_from_onec
                  type: VARCHAR(255)
              - column:
                  name: number_room
                  type: VARCHAR(150)
              - column:
                  name: price
                  type: DOUBLE
              - column:
                  name: split_system
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: conditioner_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: conditioner_model_fk
                      referencedTableName: conditioner_model
                      referencedColumnNames: id
