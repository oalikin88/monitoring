databaseChangeLog:
  - changeSet:
      id: 20260311-20
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: switch_hub
      changes:
        - createTable:
            tableName: switch_hub
            columns:
              - column:
                  name: switch_hub_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: switch_hub_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: date_exploitation_begin
                  type: DATETIME
              - column:
                  name: name_from_onec
                  type: VARCHAR(255)
              - column:
                  name: port_amount
                  type: INT
              - column:
                  name: switch_hub_type
                  type: INT
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: switch_hub_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: switch_hub_model_fk
                      referencedTableName: switch_hub_model
                      referencedColumnNames: id
