databaseChangeLog:
  - changeSet:
      id: 20260307-8
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: ats_model
      changes:
        - createTable:
            tableName: ats_model
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: ats_model_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(130)
                  constraints:
                    nullable: false
              - column:
                  name: manufacturer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: ats_model_manufacturer_fk
                    referencedTableName: ats_manufacturer
                    referencedColumnNames: id

