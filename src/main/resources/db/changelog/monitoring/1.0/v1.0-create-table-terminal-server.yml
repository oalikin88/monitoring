databaseChangeLog:
  - changeSet:
      id: 20260311-37
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: terminal_server
      changes:
        - createTable:
            tableName: terminal_server
            columns:
              - column:
                  name: terminal_server_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: terminal_server_pkey
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: terminal_server_model_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_server_terminal_server_model_fk
                    referencedTableName: terminal_server_model
                    referencedColumnNames: id
