databaseChangeLog:
  - changeSet:
      id: 20260301-4
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: phone
      changes:
        - createTable:
            tableName: phone
            columns:
              - column:
                  name: phone_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: phone_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: phone_number
                  type: VARCHAR(13)
              - column:
                  name: date_exploitation_begin
                  type: DATETIME
              - column:
                  name: name_frome_onec
                  type: VARCHAR(255)
              - column:
                  name: number_room
                  type: VARCHAR(150)
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: phone_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: phone_model_fk
                      referencedTableName: phone_model
                      referencedColumnNames: id
