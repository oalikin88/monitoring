databaseChangeLog:
  - changeSet:
      id: 20260311-19
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: sub_display_model
      changes:
        - createTable:
            tableName: sub_display_model
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: sub_display_model_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(130)
                  constraints:
                    nullable: false