databaseChangeLog:
  - changeSet:
      id: 20260301-10
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: fax
      changes:
        - createTable:
            tableName: fax
            columns:
              - column:
                  name: fax_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: fax_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: date_exploitation_begin
                  type: DATETIME
              - column:
                  name: ip_adress
                  type: VARCHAR(50)
              - column:
                  name: name_frome_onec
                  type: VARCHAR(255)
              - column:
                  name: number_room
                  type: VARCHAR(150)
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: fax_model_fk
                      referencedTableName: fax_model
                      referencedColumnNames: id
