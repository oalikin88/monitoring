databaseChangeLog:
  - changeSet:
      id: 20260311-13
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: place
      changes:
        - createTable:
            tableName: place
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: place_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: department
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: department_code
                  type: VARCHAR(40)
                  constraints:
                    nullable: false
              - column:
                  name: place_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: location_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: place_location_fk
                    referencedTableName: location
                    referencedColumnNames: id

