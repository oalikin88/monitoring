databaseChangeLog:
  - changeSet:
      id: 20260307-9
      author: Oleg Alikin
#      preConditions:
#        - onFail: MARK_RAN
#        - not:
#          tableExists:
#            tableName: battery_type
      changes:
        - createTable:
            tableName: battery_type
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: battery_type_pkey
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
