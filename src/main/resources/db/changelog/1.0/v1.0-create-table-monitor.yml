databaseChangeLog:
  - changeSet:
      id: 20260301-1
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: monitor
      changes:
        - createTable:
            tableName: monitor
            columns:
              - column:
                  name: monitor_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: monitor_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: base_type
                  type: VARCHAR(25)
              - column:
                  name: date_exploitation_begin
                  type: DATETIME
              - column:
                  name: name_frome_onec
                  type: VARCHAR(255)
              - column:
                  name: number_room
                  type: VARCHAR(150)
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: monitor_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: monitor_model_fk
                      referencedTableName: monitor_model
                      referencedColumnNames: id
