databaseChangeLog:
  - changeSet:
      id: 20260302-1
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: cpu
      changes:
        - createTable:
            tableName: cpu
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: cpu_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: core
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: freq
                  type: INT
                  constraints:
                    nullable: false

