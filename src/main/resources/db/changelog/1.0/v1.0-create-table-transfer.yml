databaseChangeLog:
  - changeSet:
      id: 20260311-43
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: transfer
      changes:
        - createTable:
            tableName: transfer
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: transfer_pkey
                    nullable: false
              - column:
                  name: date_transfer
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: document_number
                  type: VARCHAR(200)
              - column:
                  name: inventary_number_new
                  type: VARCHAR(25)
              - column:
                  name: inventary_number_old
                  type: VARCHAR(25)
              - column:
                  name: transfer_from
                  type: VARCHAR(150)
              - column:
                  name: transfer_to
                  type: VARCHAR(150)
              - column:
                  name: object_buing_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: transfer_object_buing_fk
                    referencedTableName: object_buing
                    referencedColumnNames: id                 

