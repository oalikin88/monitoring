databaseChangeLog:
  - changeSet:
      id: 20260311-16
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: server_operation_system
      changes:
        - createTable:
            tableName: server_operation_system
            columns:
              - column:
                  name: server_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: operation_system_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: server_operation_system
            columnNames: server_id, operation_system_id
            constraintName: pk_server_operation_system_server
        - addForeignKeyConstraint:
            baseTableName: server_operation_system
            baseColumnNames: server_id
            constraintName: fk_server_operation_system_server
            referencedTableName: server
            referencedColumnNames: server_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: server_operation_system
            baseColumnNames: operation_system_id
            constraintName: fk_server_operation_system_operation_system
            referencedTableName: operation_system
            referencedColumnNames: id
            onDelete: CASCADE
