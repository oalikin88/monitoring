databaseChangeLog:
  - changeSet:
      id: 20260307-5
      author: Oleg Alikin
      changes:
        - createTable:
            tableName: asuo_terminal
            columns:
              - column:
                  name: asuo_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: terminal_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: asuo_terminal
            columnNames: asuo_id, terminal_id
            constraintName: pk_asuo_terminal
        - addForeignKeyConstraint:
            baseTableName: asuo_terminal
            baseColumnNames: terminal_id
            constraintName: fk_asuo_terminal_terminal
            referencedTableName: terminal
            referencedColumnNames: terminal_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: asuo_terminal
            baseColumnNames: asuo_id
            constraintName: fk_asuo_terminal_asuo
            referencedTableName: asuo
            referencedColumnNames: asuo_id
            onDelete: CASCADE