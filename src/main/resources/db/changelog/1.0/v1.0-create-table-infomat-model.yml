databaseChangeLog:
  - changeSet:
      id: 20260311-5
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: infomat_model
      changes:
        - createTable:
            tableName: infomat_model
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: infomat_model_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(130)
                  constraints:
                    nullable: false
              - column:
                  name: manufacturer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: infomat_model_manufacturer_fk
                    referencedTableName: infomat_manufacturer
                    referencedColumnNames: id
