databaseChangeLog:
  - changeSet:
      id: 20260311-40
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: terminal_ups
      changes:
        - createTable:
            tableName: terminal_ups
            columns:
              - column:
                  name: terminal_ups_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: terminal_ups_pkey
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: terminal_ups_model_id
                  type: BOOLEAN
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_ups_terminal_ups_model_fk
                    referencedTableName: terminal_ups_model
                    referencedColumnNames: id
