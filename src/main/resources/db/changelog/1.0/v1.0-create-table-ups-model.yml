databaseChangeLog:
  - changeSet:
      id: 20260301-19
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: ups_model
      changes:
        - createTable:
            tableName: ups_model
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: ups_model_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(130)
                  constraints:
                    nullable: false
              - column:
                  name: battery_amount
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: battery_type_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: ups_battery_type_fk
                    referencedTableName: battery_type
                    referencedColumnNames: id
              - column:
                  name: manufacturer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: ups_model_manufacturer_fk
                    referencedTableName: ups_manufacturer
                    referencedColumnNames: id
