databaseChangeLog:
  - changeSet:
      id: 20260311-31
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: terminal_printer
      changes:
        - createTable:
            tableName: terminal_printer
            columns:
              - column:
                  name: terminal_printer_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: terminal_printer_pkey
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: terminal_printer_model_id
                  type: BOOLEAN
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_printer_terminal_printer_model_fk
                    referencedTableName: terminal_printer_model
                    referencedColumnNames: id
