databaseChangeLog:
  - changeSet:
      id: 20260311-25
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: terminal
      changes:
        - createTable:
            tableName: terminal
            columns:
              - column:
                  name: terminal_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: terminal_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: terminal_display_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_terminal_display_fk
                    referencedTableName: terminal_display
                    referencedColumnNames: terminal_display_id
              - column:
                  name: terminal_model_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_terminal_model_fk
                    referencedTableName: terminal_model
                    referencedColumnNames: terminal_model_id
              - column:
                  name: terminal_printer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_terminal_printer_fk
                    referencedTableName: terminal_printer
                    referencedColumnNames: terminal_printer_id
              - column:
                  name: terminal_sensor_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_terminal_sensor_fk
                    referencedTableName: terminal_sensor
                    referencedColumnNames: terminal_sensor_id
              - column:
                  name: terminal_server_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_terminal_server_fk
                    referencedTableName: terminal_server
                    referencedColumnNames: terminal_server_id
              - column:
                  name: terminal_ups_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_terminal_ups_fk
                    referencedTableName: terminal_ups
                    referencedColumnNames: terminal_ups_id