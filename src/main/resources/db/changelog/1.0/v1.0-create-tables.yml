databaseChangeLog:
  - changeSet:
    id: 1-1
    author: Oleg Alikin
    preConditions:
      - onFail: MARK_RAN
      - not:
        tableExists:
          tableName: object_buing
    changes:
      - createTable:
        columns:
          - column:
            constraints:
              nullable: false
              primaryKey: true
              primaryKeyName: object_buing_pkey
            name: id
            type: BIGINT
            autoIncrement: true
          - column:
            constraints:
              nullable: false
            name: archived
            type: BIT(1)
            defaultValueBoolean: false
          - column:
            constraints:
              nullable: false
              foreignKeyName: obj_contr_fk
              referencedTableName: contract
              referencedColumnNames: id
            name: contract_id
            type: BIGINT
          - column:
            constraints:
              nullable: false
              foreignKeyName: obj_place_fk
              referencedTableName: place
              referencedColumnNames: id
        tableName: object_buing
  - changeSet:
    id: 1-2
    author: Oleg Alikin
    preConditions:
      - onFail: MARK_RAN
      - not:
        tableExists:
          tableName: contract
    changes:
      - createTable:
        columns:
          - column:
            constraints:
              nullable: false
            name: id
            type: BIGINT
            autoIncrement: true
          - column:
            name: contract_number
            type: VARCHAR(255)
          - column:
            name: date_end_contract
            type: DATETIME
            constraints:
              nullable: false
          - column:
            name: date_start_contract
            type: DATETIME
            constraints:
              nullable: false
        tableName: contract
  - changeSet:
    id: 1-3
    author: Oleg Alikin
    preConditions:
      - onFail: MARK_RAN
      - not:
        tableExists:
          tableName: place
    changes:
      -createTable:
        columns:
          - column:
            constraints:
              nullable: false
              primaryKey: true
              primaryKeyName: place_pkey
            name: id
            type: BIGINT
            autoIncrement: true
          - column:
            constraints:
              nullable: false
            name: archived
            type: BIT(1)
            defaultValueBoolean: false
          - column:
            constraints:
              nullable: false
            name: department
            type: VARCHAR(200)
          - column:
            name: department_code
            type: VARCHAR(50)
          - column:
            constraints:
              nullable: false
            name: place_type
            type: VARCHAR(25)
          - column:
            constraints:
              nullable: false
            name: username
            type: VARCHAR(160)
          - column:
            constraints:
              nullable: false
              foreignKeyName: place_loc_fk
              referencedTableName: location
              referencedColumnNames: id
            name: location_id
            type: BIGINT
        tableName: place
  - changeSet:
    id: 1-4
    author: Oleg Alikin
    preConditions:
      - onFail: MARK_RAN
      - not:
        tableExists:
          tableName: location
    changes:
      - createTable:
        columns:
          - column:
            constraints:
              nullable: false
              primaryKey: true
              primaryKeyName: location_pkey
            name: id
            type: BIGINT
          - column:
            constraints:
              nullable: false
            name: name
            type: VARCHAR(70)
        tableName: location
        


            

