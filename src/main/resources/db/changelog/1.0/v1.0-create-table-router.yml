databaseChangeLog:
  - changeSet:
      id: 20260301-25
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: router
      changes:
        - createTable:
            tableName: router
            columns:
              - column:
                  name: router_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: router_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: ip_adress_inner
                  type: VARCHAR(50)
              - column:
                  name: ip_adress_outer
                  type: VARCHAR(50)
              - column:
                  name: port_amount
                  type: INT
              - column:
                  name: name_from_onec
                  type: VARCHAR(255)
              - column:
                  name: number_room
                  type: VARCHAR(150)
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: router_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: router_model_fk
                      referencedTableName: router_model
                      referencedColumnNames: id
