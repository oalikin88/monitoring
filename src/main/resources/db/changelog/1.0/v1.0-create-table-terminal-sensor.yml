databaseChangeLog:
  - changeSet:
      id: 20260311-34
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: terminal_sensor
      changes:
        - createTable:
            tableName: terminal_sensor
            columns:
              - column:
                  name: terminal_sensor_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: terminal_sensor_pkey
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: terminal_sensor_model_id
                  type: BOOLEAN
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_sensor_terminal_sensor_model_fk
                    referencedTableName: terminal_sensor_model
                    referencedColumnNames: id
