databaseChangeLog:
  - changeSet:
      id: 20260301-18
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: ups
      changes:
        - createTable:
            tableName: ups
            columns:
              - column:
                  name: ups_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: ups_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: date_exploitation_begin
                  type: DATETIME
              - column:
                  name: name_frome_onec
                  type: VARCHAR(255)
              - column:
                  name: number_room
                  type: VARCHAR(150)
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: year_replacement
                  type: INT
              - column:
                  name: ups_type
                  type: INT
              - column:
                  name: ups_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: ups_model_fk
                      referencedTableName: ups_model
                      referencedColumnNames: id
