databaseChangeLog:
  - changeSet:
      id: 20260302-5
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: program_software
      changes:
        - createTable:
            tableName: program_software
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: program_software_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: DOUBLE


