databaseChangeLog:
  - changeSet:
      id: 20260311-36
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: terminal_sensor_model
      changes:
        - createTable:
            tableName: terminal_sensor_model
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: terminal_sensor_model_pkey
                    nullable: false
              - column:
                  name: archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(130)
                  constraints:
                    nullable: false
              - column:
                  name: manufacturer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: terminal_sensor_model_manufacturer_fk
                    referencedTableName: terminal_sensor_manufacturer
                    referencedColumnNames: id
