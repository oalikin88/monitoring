databaseChangeLog:
  - changeSet:
      id: 20260311-4
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not:
          tableExists:
            tableName: infomat
      changes:
        - createTable:
            tableName: infomat
            columns:
              - column:
                  name: infomat_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: infomat_pkey
                    nullable: false
              - column:
                  name: inventary_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(70)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: name_from_onec
                  type: VARCHAR(255)
              - column:
                  name: number_room
                  type: VARCHAR(150)
              - column:
                  name: year_created
                  type: INT
              - column:
                  name: infomat_model_id
                  type: BIGINT
                  constraints:
                      nullable: false
                      foreignKeyName: infomat_model_fk
                      referencedTableName: infomat_model
                      referencedColumnNames: id
