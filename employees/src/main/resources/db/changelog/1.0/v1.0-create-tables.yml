databaseChangeLog:
  - changeSet:
      id: 1-1
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not: 
            tableExists:
              tableName: employees
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: employee_pkey
                  name: id
                  type: BIGINT
                  autoIncrement: true
              - column:
                  name: department_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: emp_dep_fk
                    referencedTableName: employees
                    referencedColumnNames: id
              - column:
                  constraints:
                    nullable: false
                  name: name
                  type: VARCHAR(50)
              - column:
                  constraints:
                    nullable: false
                  name: surname
                  type: VARCHAR(50)
              - column:
                  constraints:
                    nullable: true
                  name: patronymic
                  type: VARCHAR(50)
              - column:
                  constraints:
                    nullable: false
                  name: username
                  type: VARCHAR(150)
              - column:
                  constraints:
                    nullable: true
                  name: phone
                  type: VARCHAR(12)
              - column:
                  constraints:
                    nullable: false
                  name: email
                  type: VARCHAR(100)
            tableName: employees
  - changeSet:
      id: 1-2
      author: Oleg Alikin
      preConditions:
        - onFail: MARK_RAN
        - not: 
            tableExists:
              tableName: departments
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: department_pkey
                  name: id
                  type: BIGINT
                  autoIncrement: true
              - column:
                  constraints:
                    nullable: false
                  name: name
                  type: VARCHAR(250)
              - column:
                  constraints:
                    nullable: false
                  name: code
                  type: VARCHAR(250)
            tableName: departments
        